<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>Crown</title>
  <desc>Throne room crown symbol.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#23150d"/>
      <stop offset="100%" stop-color="#0b101b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dea0"/>
      <stop offset="40%" stop-color="#c89435"/>
      <stop offset="100%" stop-color="#7b4e16"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce8f6"/>
      <stop offset="45%" stop-color="#6b84a7"/>
      <stop offset="100%" stop-color="#21314f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="34%" stop-color="#f6c66a" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#f6c66a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="36" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="30" fill="none" stroke="#f1d189" stroke-opacity="0.22" stroke-width="3"/>
  <rect x="18" y="18" width="220" height="220" rx="24" fill="#04070d" fill-opacity="0.18"/>
  <rect x="30" y="30" width="196" height="196" rx="16" fill="#070b13" fill-opacity="0.5" stroke="url(#gold)" stroke-opacity="0.28"/>
  <circle cx="128" cy="88" r="84" fill="url(#glow)"/>
  <path d="M52 34h152" stroke="#ffffff" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>
  <g filter="url(#softGlow)">
    <path d="M58 162 76 88 110 120 128 72 146 120 180 88 198 162Z" fill="url(#gold)"/>
    <path d="M72 150h112" stroke="#7b4e16" stroke-width="12" stroke-linecap="round"/>
    <circle cx="76" cy="90" r="10" fill="#d7342b"/>
    <circle cx="128" cy="72" r="10" fill="#4ea8ff"/>
    <circle cx="180" cy="90" r="10" fill="#d7342b"/>
    <path d="M92 122h72" stroke="#fff0cf" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
  </g>
