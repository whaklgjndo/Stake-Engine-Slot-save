    <circle cx="128" cy="128" r="42" fill="url(#hub)" stroke="#dce6f7" stroke-opacity="0.6" stroke-width="5"/>
    <path d="M128 84v88M84 128h88M98 98l60 60M158 98l-60 60" stroke="#cdd7e9" stroke-opacity="0.45" stroke-width="5" stroke-linecap="round"/>
    <circle cx="128" cy="128" r="10" fill="#eef5ff"/>
    <circle cx="128" cy="52" r="10" fill="#2d7fff" stroke="url(#rim)" stroke-width="4"/>
    <circle cx="128" cy="204" r="10" fill="#2d7fff" stroke="url(#rim)" stroke-width="4"/>
    <circle cx="52" cy="128" r="10" fill="#2d7fff" stroke="url(#rim)" stroke-width="4"/>
    <circle cx="204" cy="128" r="10" fill="#2d7fff" stroke="url(#rim)" stroke-width="4"/>
    <circle cx="74" cy="74" r="8" fill="#2d7fff" stroke="url(#rim)" stroke-width="3"/>
    <circle cx="182" cy="74" r="8" fill="#2d7fff" stroke="url(#rim)" stroke-width="3"/>
