<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>Blue Wheel</title>
  <desc>Blue Wheel medallion wheel symbol.</desc>
  <defs>
    <radialGradient id="disc" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#173f86"/>
      <stop offset="100%" stop-color="#0b1d40"/>
    </radialGradient>
    <radialGradient id="hub" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#eff5ff"/>
      <stop offset="52%" stop-color="#909bad"/>
      <stop offset="100%" stop-color="#2f3b4e"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6dea0"/>
